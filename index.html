<!DOCTYPE html>
<html>
<head>
    <title>MODI – Mode Controller</title>
</head>
<body>
    <h1>MODI – Mode Controller</h1>
    <p>Steuert Systemmodi und Routing.</p>

    <button onclick="setMode('scan')">Scan-Modus</button>
    <button onclick="setMode('dom')">DOM-Modus</button>
    <button onclick="setMode('route')">Routing-Modus</button>

    <script>
        function setMode(mode) {
            console.log("Mode aktiviert:", mode);
        }
    </script>
</body>
</html>
